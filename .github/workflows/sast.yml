name: SAST Security Scan — API (Python Backend)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write
  contents: read
  actions: read

jobs:

  # ── 1. Secret scanning ────────────────────────────────────────────────────
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Semgrep SAST — Python only ─────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --metrics=off \
            . || true

      - name: Sanitize SARIF severity values
        run: |
          python3 << 'EOF'
          import json, sys

          # GitHub requires security-severity to be a numeric CVSS string
          SEVERITY_MAP = {
              "critical": "9.0",
              "high":     "7.0",
              "medium":   "5.0",
              "low":      "2.0",
              "warning":  "3.0",
              "error":    "7.0",
              "info":     "1.0",
          }

          with open("semgrep.sarif") as f:
              sarif = json.load(f)

          for run in sarif.get("runs", []):
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  props = rule.get("properties", {})
                  sev = props.get("security-severity", "")
                  if isinstance(sev, str) and not sev.replace(".", "").isdigit():
                      props["security-severity"] = SEVERITY_MAP.get(sev.lower(), "5.0")
                      rule["properties"] = props

          with open("semgrep.sarif", "w") as f:
              json.dump(sarif, f)

          print("SARIF sanitized successfully")
          EOF

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          wait-for-processing: true
        if: always()

  # ── 3. Python dependency CVE check ────────────────────────────────────────
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            --format json \
            --output pip-audit-results.json
        continue-on-error: true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
        if: always()

  # ── 4. Bandit — Python security linter ────────────────────────────────────
  # ── 4. Bandit — Python security linter ────────────────────────────────────
  bandit:
    name: Bandit Python linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.venv,./venv,./tests \
            -f json \
            -o bandit-results.json || true

      - name: Upload Bandit results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json
        if: always()