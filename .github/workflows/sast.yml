name: SAST Security Scan — API (Python Backend)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write
  contents: read
  actions: read

jobs:

  # ── 1. Secret scanning ────────────────────────────────────────────────────
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Semgrep SAST — Python only ─────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/flask \
            --config p/bandit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
        if: always()

  # ── 3. Python dependency CVE check ────────────────────────────────────────
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            --format json \
            --output pip-audit-results.json
        continue-on-error: true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
        if: always()

  # ── 4. Bandit — Python security linter ────────────────────────────────────
  # ── 4. Bandit — Python security linter ────────────────────────────────────
  bandit:
    name: Bandit Python linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit and sarif converter
        run: pip install bandit bandit-sarif-formatter

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.venv,./venv,./tests \
            -f json \
            -o bandit-results.json || true

      - name: Convert to SARIF
        run: |
          if [ -f bandit-results.json ] && [ -s bandit-results.json ]; then
            bandit-sarif-formatter bandit-results.json > bandit.sarif
          else
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Documents/CommitteeSpecifications/2.1.0/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Bandit","version":"1.0.0","rules":[]}},"results":[]}]}' > bandit.sarif
          fi

      - name: Upload Bandit SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          wait-for-processing: true
        if: always()

      - name: Upload Bandit results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json
        if: always()